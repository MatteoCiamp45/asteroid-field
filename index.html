<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Field</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #aaa;
        font-family: monospace;
        font-size: 14px;
        gap: 16px;
        z-index: 100;
        transition: opacity 0.6s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading-bar-wrap {
        width: 260px;
        height: 3px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-bar {
        height: 100%;
        width: 0%;
        background: #7ec8e3;
        transition: width 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <span id="loading-text">Loading asteroid field…</span>
      <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
